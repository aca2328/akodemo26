# ---------------------------------------------------------------------------
# Service: LoadBalancer (Layer 4 Test) — NodePort demo
# AKO will provision a dedicated Virtual Service and VIP for this.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: avi-hello-nodeport-l4
  namespace: default
  labels:
    app: avi-hello-nodeport
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: avi-hello-nodeport
