apiVersion: apps/v1
kind: Deployment
metadata:
  name: avi-hello-world-test
  namespace: default
  labels:
    app: avi-hello-test
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: avi-hello
      version: v1
  template:
    metadata:
      labels:
        app: avi-hello
        version: v1
    spec:
      containers:
        - name: hello
          image: nginxdemos/hello:plain-text
          ports:
            - containerPort: 80
          # Fix: Create the /live file so Nginx can serve it
          lifecycle:
            postStart:
              exec:
                command:
                  ["/bin/sh", "-c", "echo 'OK' > /usr/share/nginx/html/live"]
          livenessProbe:
            httpGet:
              path: / # The root path exists by default
              port: 80 # Changed from 8080 to 80
            initialDelaySeconds: 3
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /live # This now works because of the lifecycle hook above
              port: 80 # Changed from 8080 to 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 50m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
