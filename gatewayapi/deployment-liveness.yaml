apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: avi-hello
    version: v1
  name: avi-hello-world-test
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: avi-hello
      version: v1
  template:
    metadata:
      labels:
        app: avi-hello
        version: v1
    spec:
      containers:
        - image: nginxdemos/hello:plain-text
          initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
          name: hello
          periodSeconds: 5
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 50m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
