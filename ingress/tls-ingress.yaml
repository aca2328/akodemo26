# ---------------------------------------------------------------------------
# Ingress (Layer 7 Test)
# AKO translates this into L7 Rules on a Shared or Dedicated Virtual Service.
# NOTE: Ensure 'ingressClassName' matches your AKO values.yaml (default is 'avi-lb').
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tls-avi-hello-ingress
  namespace: default
  annotations:
    ako.vmware.com/enable-tls: "false"
spec:
  ingressClassName: avi-lb
  tls:
    - hosts:
        - hello-tls.110.ams.avilab.eu
      secretName: hello-tls.110.ams.avilab.eu
    - hosts:
        - hello2-tls.110.ams.avilab.eu
      secretName: hello2-tls.110.ams.avilab.eu
  rules:
    - host: hello-tls.110.ams.avilab.eu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: avi-hello-svc
                port:
                  number: 80
    - host: hello2-tls.110.ams.avilab.eu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: avi-hello-svc
                port:
                  number: 80
